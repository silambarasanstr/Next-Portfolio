name: Next.js CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'yarn'

      # ✅ Install dependencies
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ✅ Build project
      - name: Build Next.js app
        run: yarn build

      # ✅ Optional: Run lint
      - name: Lint
        run: yarn lint || true